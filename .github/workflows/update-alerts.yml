name: Daily Scam Alert Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch scam alerts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_alerts.py

      - name: Commit and push
        run: |
          git config user.name "ScamRadar Bot"
          git config user.email "bot@scamradar.com.au"
          git stash
          git pull --rebase origin main
          git stash pop
          git add content.json
          git diff --staged --quiet || git commit -m "Daily alert update $(date +'%Y-%m-%d')"
          git push